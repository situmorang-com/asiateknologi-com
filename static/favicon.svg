<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#0a0a0f"/>

  <!-- Tech symbol: Circuit pattern -->
  <g stroke="#00e5ff" stroke-width="3" fill="none">
    <!-- Horizontal lines -->
    <line x1="20" y1="40" x2="108" y2="40"/>
    <line x1="20" y1="64" x2="108" y2="64"/>
    <line x1="20" y1="88" x2="108" y2="88"/>

    <!-- Vertical connections -->
    <line x1="40" y1="20" x2="40" y2="108"/>
    <line x1="64" y1="20" x2="64" y2="108"/>
    <line x1="88" y1="20" x2="88" y2="108"/>
  </g>

  <!-- Connection nodes -->
  <circle cx="40" cy="40" r="4" fill="#00e5ff"/>
  <circle cx="40" cy="64" r="4" fill="#00e5ff"/>
  <circle cx="40" cy="88" r="4" fill="#00e5ff"/>
  <circle cx="64" cy="40" r="4" fill="#00e5ff"/>
  <circle cx="64" cy="64" r="6" fill="#00e5ff"/>
  <circle cx="64" cy="88" r="4" fill="#00e5ff"/>
  <circle cx="88" cy="40" r="4" fill="#00e5ff"/>
  <circle cx="88" cy="64" r="4" fill="#00e5ff"/>
  <circle cx="88" cy="88" r="4" fill="#00e5ff"/>
</svg>
