<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" fill="#0a0a0f"/>

  <!-- Purple diamond pattern matching Asiateknologi logo -->
  <g fill="#a78bfa">
    <!-- Top diamond -->
    <polygon points="64,16 80,32 64,48 48,32"/>

    <!-- Middle diamonds -->
    <polygon points="48,48 64,64 48,80 32,64"/>
    <polygon points="80,48 96,64 80,80 64,64"/>

    <!-- Bottom diamond -->
    <polygon points="64,80 80,96 64,112 48,96"/>
  </g>

  <!-- Accent lines -->
  <g stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.6">
    <line x1="32" y1="32" x2="96" y2="96"/>
    <line x1="96" y1="32" x2="32" y2="96"/>
  </g>
</svg>
