<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Logo area -->
  <image href="data:image/png;base64," x="50" y="50" width="120" height="120"/>

  <!-- Text content -->
  <text x="200" y="130" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="#e0e0eb">
    Asiateknologi
  </text>

  <text x="200" y="200" font-family="Inter, system-ui, sans-serif" font-size="36" fill="#a78bfa">
    Enterprise IT Solutions
  </text>

  <text x="200" y="260" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#b8b8cc">
    Consulting • IoT • Cloud • Security • Recruitment
  </text>

  <!-- Decorative elements -->
  <circle cx="1050" cy="100" r="6" fill="#a78bfa"/>
  <circle cx="1090" cy="130" r="4" fill="#8b5cf6"/>
  <circle cx="1110" cy="170" r="5" fill="#a78bfa"/>
</svg>
