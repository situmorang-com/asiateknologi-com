<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Accent bar -->
  <rect width="1200" height="8" fill="url(#accentGradient)"/>

  <!-- Circuit pattern background -->
  <g stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.1">
    <circle cx="150" cy="150" r="80"/>
    <circle cx="1050" cy="480" r="100"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke-dasharray="20,20"/>
  </g>

  <!-- Main content -->
  <text x="100" y="200" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="#e0e0eb">
    Asiateknologi
  </text>

  <text x="100" y="280" font-family="Inter, system-ui, sans-serif" font-size="40" fill="#00e5ff">
    Enterprise IT Solutions
  </text>

  <text x="100" y="340" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#b8b8cc">
    Consulting • IoT • Cloud • Security • Recruitment
  </text>

  <!-- Tagline -->
  <text x="100" y="450" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#9090a8">
    Bridging technology gaps across Southeast Asia
  </text>

  <!-- Website URL -->
  <text x="100" y="560" font-family="'Courier New', monospace" font-size="20" fill="#6b6b8a">
    asiateknologi.com
  </text>

  <!-- Decorative elements -->
  <circle cx="1100" cy="100" r="6" fill="#00e5ff"/>
  <circle cx="1130" cy="130" r="4" fill="#3b82f6"/>
  <circle cx="1150" cy="170" r="5" fill="#00e5ff"/>
</svg>
